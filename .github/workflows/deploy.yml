# Deployment pipeline: staging → smoke test → production (manual gate)
#
# Triggered on every push to main.
# See .github/workflows/README.md for one-time GCP setup instructions.
#
# Repository variables required (Settings → Secrets and variables → Variables):
#   WIF_PROVIDER_STAGING      Workload Identity provider resource name (staging)
#   WIF_PROVIDER_PROD         Workload Identity provider resource name (prod)
#   WIF_SA_STAGING            Service account email for staging deploys
#   WIF_SA_PROD               Service account email for production deploys
#   GCP_PROJECT_STAGING       GCP project ID for staging
#   GCP_PROJECT_PROD          GCP project ID for production
#   VITE_WCA_CLIENT_ID_STAGING  WCA OAuth client ID for staging
#   VITE_WCA_CLIENT_ID_PROD     WCA OAuth client ID for production
#   STAGING_URL               Full URL of the staging app (e.g. https://YOUR_PROJECT.appspot.com)
#   PROD_URL                  Full URL of the production app

name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ── 1. Deploy to staging ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.slug.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      # App Engine version names must be lowercase letters, digits, or hyphens.
      - name: Compute version slug
        id: slug
        run: echo "version=ci-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (staging)
        env:
          VITE_WCA_CLIENT_ID: ${{ vars.VITE_WCA_CLIENT_ID_STAGING }}
        run: npm run build

      - name: Authenticate to Google Cloud (staging)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGING }}
          service_account: ${{ vars.WIF_SA_STAGING }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to staging
        run: ./deploy.sh -s -v "${{ steps.slug.outputs.version }}"

  # ── 2. Smoke test ─────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (staging)
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Wait for App Engine warm-up
        run: sleep 15

      - name: Smoke test — GET /
        run: |
          url="${{ vars.STAGING_URL }}/"
          echo "Probing: ${url}"

          for attempt in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${url}")
            if [ "${status}" -ge 200 ] && [ "${status}" -lt 400 ]; then
              echo "OK — HTTP ${status} (attempt ${attempt})"
              exit 0
            fi
            echo "HTTP ${status} (attempt ${attempt}/3); retrying in 15 s…"
            sleep 15
          done

          echo "::error::Smoke test failed — GET ${url} never returned 2xx/3xx"
          exit 1

  # ── 3. Production deploy (manual gate) ────────────────────────────────────
  #
  # The 'production' GitHub environment must have required reviewers configured.
  # See README.md → "Create the production environment".
  deploy-production:
    name: Deploy → Production
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        env:
          VITE_WCA_CLIENT_ID: ${{ vars.VITE_WCA_CLIENT_ID_PROD }}
        run: npm run build

      - name: Authenticate to Google Cloud (production)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to production
        run: ./deploy.sh -p

  # ── 4. Clean up old staging versions ─────────────────────────────────────
  cleanup-staging:
    name: Cleanup old staging versions
    needs: smoke-test
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Authenticate to Google Cloud (staging)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGING }}
          service_account: ${{ vars.WIF_SA_STAGING }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete old staging versions (keep newest 5)
        env:
          PROJECT: ${{ vars.GCP_PROJECT_STAGING }}
          KEEP: "5"
        run: |
          all=$(gcloud app versions list \
            --project="${PROJECT}" \
            --service="default" \
            --sort-by="~version.createTime" \
            --format="value(version.id)" 2>/dev/null || true)

          [ -z "${all}" ] && echo "No versions found — skipping" && exit 0

          to_delete=$(echo "${all}" | tail -n +$((KEEP + 1)))

          [ -z "${to_delete}" ] && \
            echo "$(echo "${all}" | wc -l | tr -d ' ') version(s) present — nothing to remove" && \
            exit 0

          echo "Removing: $(echo "${to_delete}" | tr '\n' ' ')"
          while IFS= read -r v; do
            gcloud app versions delete "${v}" \
              --project="${PROJECT}" \
              --service="default" \
              --quiet \
              && echo "✓ deleted ${v}" \
              || echo "✗ could not delete ${v} (skipping)"
          done <<< "${to_delete}"

  # ── 5. Clean up old production versions ──────────────────────────────────
  cleanup-production:
    name: Cleanup old production versions
    needs: deploy-production
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Authenticate to Google Cloud (production)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete old production versions (keep newest 5)
        env:
          PROJECT: ${{ vars.GCP_PROJECT_PROD }}
          KEEP: "5"
        run: |
          all=$(gcloud app versions list \
            --project="${PROJECT}" \
            --service="default" \
            --sort-by="~version.createTime" \
            --format="value(version.id)" 2>/dev/null || true)

          [ -z "${all}" ] && echo "No versions found — skipping" && exit 0

          to_delete=$(echo "${all}" | tail -n +$((KEEP + 1)))

          [ -z "${to_delete}" ] && \
            echo "$(echo "${all}" | wc -l | tr -d ' ') version(s) present — nothing to remove" && \
            exit 0

          echo "Removing: $(echo "${to_delete}" | tr '\n' ' ')"
          while IFS= read -r v; do
            gcloud app versions delete "${v}" \
              --project="${PROJECT}" \
              --service="default" \
              --quiet \
              && echo "✓ deleted ${v}" \
              || echo "✗ could not delete ${v} (skipping)"
          done <<< "${to_delete}"
