# Deployment pipeline — push to main → build → deploy to App Engine.
#
# See .github/workflows/README.md for one-time GCP setup instructions.
#
# Repository variables required (Settings → Secrets and variables → Variables):
#   WIF_PROVIDER        Workload Identity provider resource name
#   WIF_SA              Service account email for deploys
#   VITE_WCA_CLIENT_ID  WCA OAuth client ID

name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT: scorecards-v2-prod

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ── 1. Build and deploy ───────────────────────────────────────────────────
  deploy:
    name: Deploy → Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_WCA_CLIENT_ID: ${{ vars.VITE_WCA_CLIENT_ID }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to App Engine
        run: ./deploy.sh

  # ── 2. Clean up old versions (keep newest 5) ──────────────────────────────
  cleanup:
    name: Cleanup old versions
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete old versions (keep newest 5)
        env:
          KEEP: "5"
        run: |
          all=$(gcloud app versions list \
            --project="${PROJECT}" \
            --service="default" \
            --sort-by="~version.createTime" \
            --format="value(version.id)" 2>/dev/null || true)

          [ -z "${all}" ] && echo "No versions found — skipping" && exit 0

          to_delete=$(echo "${all}" | tail -n +$((KEEP + 1)))

          [ -z "${to_delete}" ] && \
            echo "$(echo "${all}" | wc -l | tr -d ' ') version(s) — nothing to remove" && \
            exit 0

          echo "Removing: $(echo "${to_delete}" | tr '\n' ' ')"
          while IFS= read -r v; do
            gcloud app versions delete "${v}" \
              --project="${PROJECT}" \
              --service="default" \
              --quiet \
              && echo "✓ deleted ${v}" \
              || echo "✗ could not delete ${v} (skipping)"
          done <<< "${to_delete}"
